services:
  - type: web
    name: ai-learner-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set this in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://your-capacitor-app.com,https://your-frontend.onrender.com
      - key: PORT
        generateValue: false
